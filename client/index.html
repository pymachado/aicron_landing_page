<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AICRON — Automatización con IA para empresas en LATAM y EE.UU.</title>
    <meta name="description" content="Automatizamos procesos, implementamos IA y eliminamos fricción operativa. Agencia B2B en Houston, TX. Chatbots, CRM, flujos automáticos y blockchain. Diagnóstico gratuito." />

    <!-- Open Graph Tags for social sharing -->
    <meta property="og:title" content="AICRON — Automatización con IA para empresas" />
    <meta property="og:description" content="Eliminamos la fricción operativa con IA y automatización. Diagnóstico gratuito · ROI medible · Houston, TX." />
    <meta property="og:url" content="https://aicron.cloud/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AICRON — Automatización con IA para empresas" />
    <meta name="twitter:description" content="Eliminamos la fricción operativa con IA y automatización. Diagnóstico gratuito · ROI medible · Houston, TX." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3CB043" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AICRON" />

    <!-- Google Fonts — solo Inter y Montserrat (las únicas que se usan) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
